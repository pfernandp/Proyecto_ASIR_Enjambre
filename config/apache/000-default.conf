<VirtualHost *:80>
    # Administración del sitio por defecto
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Orquestación de Redirección Forzosa (HTTP ➔ HTTPS)
    # Se utiliza el motor de reescritura para garantizar la confidencialidad de la sesión
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # Gestión de registros de para auditoría
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
