<VirtualHost _default_:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # Activación del motor de cifrado SSL/TLS
    SSLEngine on

    # Vinculación de activos criptográficos (RSA 4096 bits)
    # Las rutas deben coincidir con el almacén administrativo del contenedor
    SSLCertificateFile /etc/apache2/ssl/certificado/server.crt
    SSLCertificateKeyFile /etc/apache2/ssl/certificado/server.key

    # Configuración de seguridad del DocumentRoot (Apache 2.4+)
    # Se habilita el acceso y se permite el uso de .htaccess para máxima flexibilidad
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Auditoría y trazabilidad de la capa de transporte
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
